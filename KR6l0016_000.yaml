front:
  text: 阿毘曇心論經序今欲解釋阿毘曇心利益弟子故問曰不須解釋所以者何古昔論師已釋阿毘曇心利益弟子故不須釋答曰不然應須解釋所以者何古昔論師雖釋阿毘曇心太廣太略彼未學者迷惑煩勞無由能取我今離於廣略但光顯修多羅自性是故須釋問曰何故釋阿毘曇心利益弟子耶答曰彼中已說不顛倒法相釋不顛倒法相令彼覺悟真實是故離諸過惡生諸功德得勇猛第一義利問曰若如是者隨意解釋答曰我當解釋但諸師造論以吉為初一切吉中三寶最勝是故本師為顯三寶少分功德故於論初先說此偈
